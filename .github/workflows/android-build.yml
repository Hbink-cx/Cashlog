name: Build Android APK (Bubblewrap)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore android-twa/android.keystore \
            -alias cashlog -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass cashlog123 -keypass cashlog123 \
            -dname "CN=Test, O=Test, C=CN" -noprompt

      - name: Build APK
        run: |
          cd android-twa
          npx @bubblewrap/cli build

      - uses: actions/upload-artifact@v4
        with:
          name: Cashlog-Android
          path: android-twa/*.apk
