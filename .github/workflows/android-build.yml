name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: npm install
      - run: npm run build

      - name: Setup Android SDK
        run: |
          echo "=== Downloading Android cmdline-tools ==="
          curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -o /tmp/cmdline.zip
          ls -la /tmp/cmdline.zip
          unzip -qo /tmp/cmdline.zip -d /tmp/cmdline-tools
          ls -la /tmp/cmdline-tools/
          ls -la /tmp/cmdline-tools/cmdline-tools/bin/
          echo "=== Installing SDK 33 ==="
          yes | /tmp/cmdline-tools/cmdline-tools/bin/sdkmanager --sdk_root=/tmp/sdk --licenses
          /tmp/cmdline-tools/cmdline-tools/bin/sdkmanager --sdk_root=/tmp/sdk "platforms;android-33" "build-tools;33.0.2"
          echo "=== Writing local.properties ==="
          echo "sdk.dir=/tmp/sdk" > android/local.properties
          cat android/local.properties
          echo "=== SDK contents ==="
          ls /tmp/sdk/platforms/
          ls /tmp/sdk/build-tools/

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Cashlog-Android
          path: android/app/build/outputs/apk/debug/*.apk
