name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - run: npm install
      - run: npm run build

      - name: Download Android SDK
        run: |
          curl -sLO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -qo commandlinetools-linux-11076708_latest.zip
          mkdir -p ~/android-sdk/cmdline-tools
          mv cmdline-tools ~/android-sdk/cmdline-tools/latest
          yes | ~/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk --licenses
          ~/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk "platforms;android-34" "build-tools;34.0.0"
          echo "sdk.dir=$HOME/android-sdk" > android/local.properties

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 个人理财助手-android
          path: android/app/build/outputs/apk/debug/*.apk
