name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: npm install
      - run: npm run build

      - name: Install Android SDK
        run: |
          set -e
          
          # Download cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -o /tmp/cmdline.zip
          unzip -qo /tmp/cmdline.zip -d /tmp
          
          # Install SDK 33
          yes | /tmp/cmdline-tools/bin/sdkmanager --sdk_root=/tmp/sdk --licenses > /dev/null 2>&1
          /tmp/cmdline-tools/bin/sdkmanager --sdk_root=/tmp/sdk "platforms;android-33" "build-tools;33.0.2" > /dev/null 2>&1
          
          echo "sdk.dir=/tmp/sdk" > android/local.properties
          echo "Android SDK installed to /tmp/sdk"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: Cashlog-Android
          path: android/app/build/outputs/apk/debug/*.apk
