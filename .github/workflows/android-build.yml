name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - run: npm install
      - run: npm run build

      - name: Install Android SDK 35
        run: |
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cli.zip
          unzip -qo /tmp/cli.zip -d /tmp
          yes | /tmp/cmdline-tools/bin/sdkmanager --sdk_root=/tmp/sdk --licenses > /dev/null 2>&1
          /tmp/cmdline-tools/bin/sdkmanager --sdk_root=/tmp/sdk "platforms;android-35" "build-tools;35.0.0"
          echo "sdk.dir=/tmp/sdk" > android/local.properties

      - run: npx cap sync android

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: Cashlog-Android
          path: android/app/build/outputs/apk/debug/*.apk
