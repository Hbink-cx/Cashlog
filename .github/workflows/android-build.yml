name: Build Android APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      
      - run: npm install
      - run: npm run build
      
      - name: Install Android SDK
        run: |
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/c.zip
          unzip -qo /tmp/c.zip -d /tmp/sdk
          yes | /tmp/sdk/cmdline-tools/bin/sdkmanager --sdk_root=/tmp/sdkroot --licenses || true
          /tmp/sdk/cmdline-tools/bin/sdkmanager --sdk_root=/tmp/sdkroot "platforms;android-35" "build-tools;35.0.0" || true
          echo "sdk.dir=/tmp/sdkroot" > android/local.properties
      
      - run: npx cap sync android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug
      
      - uses: actions/upload-artifact@v4
        with: { name: Cashlog-APK, path: 'android/app/build/outputs/apk/debug/*.apk' }
