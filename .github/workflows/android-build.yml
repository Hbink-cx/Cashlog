name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - run: npm install

      - run: npm run build

      - name: Setup Android SDK
        run: |
          ANDROID_HOME=/usr/local/lib/android/sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sOL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          rm commandlinetools-linux-11076708_latest.zip
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses 2>/dev/null
          sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-35" "build-tools;35.0.0" "platform-tools" 2>/dev/null
          echo "sdk.dir=$ANDROID_HOME" > $GITHUB_WORKSPACE/android/local.properties

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore $GITHUB_WORKSPACE/android/release.keystore \
            -alias cashlog -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass cashlog123 -keypass cashlog123 \
            -dname "CN=Cashlog, OU=Dev, O=Cashlog, L=SZ, ST=GD, C=CN" \
            -noprompt

      - name: Sync Capacitor
        run: |
          cd $GITHUB_WORKSPACE
          npx cap sync android

      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE/android
          chmod +x gradlew
          ./gradlew assembleDebug
          cd ..

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 个人理财助手-android
          path: android/app/build/outputs/apk/debug/*.apk
