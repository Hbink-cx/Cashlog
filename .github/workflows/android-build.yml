name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - run: npm install
      - run: npm run build

      - name: Setup Android SDK
        run: |
          SDK=/tmp/android-sdk
          mkdir -p $SDK/cmdline-tools
          cd $SDK/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cli.zip
          unzip -qo cli.zip && mv cmdline-tools latest && rm cli.zip
          yes | ./latest/bin/sdkmanager --sdk_root=$SDK --licenses > /dev/null 2>&1
          ./latest/bin/sdkmanager --sdk_root=$SDK "platforms;android-35" "build-tools;35.0.0" > /dev/null 2>&1
          echo "sdk.dir=$SDK" > android/local.properties
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV

      - run: npx cap sync android

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: Cashlog-Android-APK
          path: android/app/build/outputs/apk/debug/*.apk
