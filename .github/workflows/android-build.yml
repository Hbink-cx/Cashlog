name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - run: npm install
      - run: npm run build

      - name: Setup Android SDK
        run: |
          set -e
          SDK=$HOME/android-sdk
          echo "SDK dir: $SDK"

          # Download commandline tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdline.zip
          unzip -qo /tmp/cmdline.zip -d /tmp/cmdline
          mkdir -p $SDK/cmdline-tools
          mv /tmp/cmdline/cmdline-tools $SDK/cmdline-tools/latest

          # Accept licenses
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK --licenses

          # Install platform and build tools
          $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK "platforms;android-34" "build-tools;34.0.0"

          # Write config
          echo "sdk.dir=$SDK" > $GITHUB_WORKSPACE/android/local.properties
          cat $GITHUB_WORKSPACE/android/local.properties

      - run: npx cap sync android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: 个人理财助手-android
          path: android/app/build/outputs/apk/debug/*.apk
