name: Build Android APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }

      - run: npm install
      - run: npm run build

      - name: Setup Android SDK 35
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list 2>/dev/null | head -1 || echo "Trying apt..."
          sudo apt-get update -qq && sudo apt-get install -y -qq android-sdk 2>/dev/null || true
          if [ -f $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager ]; then
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses 2>/dev/null || true
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-35" "build-tools;35.0.0" 2>/dev/null || true
          fi
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "(no platforms)"
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - run: npx cap sync android

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: Cashlog-APK
          path: android/app/build/outputs/apk/debug/*.apk
