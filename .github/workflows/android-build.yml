name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - run: npm install

      - run: npm run build

      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT=${{ runner.temp }}/android-sdk
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools

          cd $ANDROID_SDK_ROOT/cmdline-tools
          curl -sOL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          rm commandlinetools-linux-11076708_latest.zip

          yes | ./latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses > /dev/null 2>&1
          ./latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-35" "build-tools;35.0.0" "platform-tools" > /dev/null 2>&1

          # Create local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > $GITHUB_WORKSPACE/android/local.properties

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore android/release.keystore \
            -alias cashlog -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass cashlog123 -keypass cashlog123 \
            -dname "CN=Cashlog, OU=Dev, O=Cashlog, L=SZ, ST=GD, C=CN" \
            -noprompt

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          cd ..

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 个人理财助手-android
          path: android/app/build/outputs/apk/release/*.apk
