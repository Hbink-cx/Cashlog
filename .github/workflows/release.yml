name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run build

      - name: Download Electron & bundle
        run: |
          npx electron-builder --win --x64 --dir -c.win.signAndEditExecutable=false -c.publish=never
          node scripts/pack.js
        timeout-minutes: 10

      - name: Create portable ZIP
        run: Compress-Archive -Path release/win-unpacked/* -DestinationPath 个人理财助手-win-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: 个人理财助手-win-x64
          path: 个人理财助手-win-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run build

      - name: Package Electron (unpacked)
        run: npx electron-builder --mac --x64 --dir -c.mac.identity=null -c.publish=never
        timeout-minutes: 10

      - name: Archive
        run: |
          cd release
          zip -r 个人理财助手-macos-x64.zip mac*

      - uses: actions/upload-artifact@v4
        with:
          name: 个人理财助手-macos
          path: release/个人理财助手-macos-x64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run build

      - name: Package Electron (unpacked)
        run: npx electron-builder --linux --x64 --dir -c.publish=never
        timeout-minutes: 10

      - name: Archive
        run: |
          cd release
          tar -czf 个人理财助手-linux-x64.tar.gz linux-unpacked

      - uses: actions/upload-artifact@v4
        with:
          name: 个人理财助手-linux
          path: release/个人理财助手-linux-x64.tar.gz
