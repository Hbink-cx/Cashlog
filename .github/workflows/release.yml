name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Electron pack
        run: npx electron-builder --win --x64 --dir
        timeout-minutes: 15
      - name: Zip
        run: Compress-Archive -Path release/win-unpacked/* -DestinationPath release/个人理财助手-win-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/个人理财助手-win-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Package with @electron/packager (no signing)
        run: |
          npx @electron/packager . "个人理财助手" \
            --platform=darwin \
            --arch=x64 \
            --electron-version=33.2.0 \
            --out=release \
            --overwrite \
            --ignore="node_modules|src|scripts|\.git.*|\.github|\.vscode"
        timeout-minutes: 10
      - name: Zip
        run: cd release && zip -r 个人理财助手-macos-x64.zip "个人理财助手-darwin-x64"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: release/个人理财助手-macos-x64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Electron pack
        run: npx electron-builder --linux --x64 --dir
        timeout-minutes: 15
      - name: Tar
        run: cd release && tar -czf 个人理财助手-linux-x64.tar.gz linux-unpacked
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: release/个人理财助手-linux-x64.tar.gz

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          name: "个人理财助手 v1.0.0"
          body: |
            ## 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `个人理财助手-win-x64.zip` | 解压后双击 `个人理财助手.exe` |
            | macOS | `个人理财助手-macos-x64.zip` | 解压后运行 |
            | Linux | `个人理财助手-linux-x64.tar.gz` | 解压后运行 |

            ## 功能

            - 无限级分类管理
            - 旭日图 + 桑基图可视化
            - 智能预算追踪 + 超限预警
            - 深色模式 / 数据导入导出
            - 本地存储，零网络请求
          files: |
            artifacts/windows-build/个人理财助手-win-x64.zip
            artifacts/macos-build/个人理财助手-macos-x64.zip
            artifacts/linux-build/个人理财助手-linux-x64.tar.gz
