name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Electron pack (unpacked)
        run: npx electron-builder --win --x64 --dir
        timeout-minutes: 15
      - name: Zip portable
        run: Compress-Archive -Path release/win-unpacked/* -DestinationPath release/个人理财助手-win-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: 个人理财助手-Windows
          path: release/个人理财助手-win-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Electron pack (unpacked)
        run: npx electron-builder --mac --x64 --dir
        timeout-minutes: 15
      - name: Zip macOS build
        run: |
          cd release
          zip -r 个人理财助手-macos-x64.zip mac*
      - uses: actions/upload-artifact@v4
        with:
          name: 个人理财助手-macOS
          path: release/个人理财助手-macos-x64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Electron pack (unpacked)
        run: npx electron-builder --linux --x64 --dir
        timeout-minutes: 15
      - name: Zip Linux build
        run: |
          cd release
          tar -czf 个人理财助手-linux-x64.tar.gz linux-unpacked
      - uses: actions/upload-artifact@v4
        with:
          name: 个人理财助手-Linux
          path: release/个人理财助手-linux-x64.tar.gz
